<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Vegetable Store</title>
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>

    <div class="container">

        <!-- Lemon Card -->
        <div class="card lemons">
            <img src="https://images.unsplash.com/photo-1590502593747-42a996133562?w=500" alt="Lemon">
            <h1>Lemons</h1>
            <p>Price: ₹20/kg</p>
            <button>Order Now</button>
        </div>

        <!-- Carrot Card -->
        <div class="card carrot">
            <img src="https://images.unsplash.com/photo-1447175008436-054170c2e979?w=500" alt="Carrot">
            <h1>Carrots</h1>
            <p>Price: ₹80/kg</p>
            <button>Order Now</button>
        </div>

        <!-- Capsicum Card -->
        <div class="card capsicum">
            <img src="https://images.unsplash.com/photo-1563565375-f3fdfdbefa83?w=500" alt="Capsicum">
            <h1>Capsicum</h1>
            <p>Price: ₹60/kg</p>
            <button>Order Now</button>
        </div>

    </div>

</body>
</html>
